name: 'Run unit tests'

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  run_tests:
    name: Run Django Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --mount type=tmpfs,destination=/var/lib/postgresql/data --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      #----------------------------------------------
      # Make use of the Step Security Harden Runner workflow to monitor the build process.
      #----------------------------------------------
      - name: Harden the GitHub runner
        uses: step-security/harden-runner@v2.14.2
        with:
          egress-policy: audit
      #----------------------------------------------
      # Checkout repo
      #----------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v6
        id: checkout-repo
        with:
          fetch-depth: 0
      #----------------------------------------------
      # Install & configure uv
      #----------------------------------------------
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.13'
          enable-cache: true
      #----------------------------------------------
      # Install project dependencies
      #----------------------------------------------
      - name: Install dependencies
        run: uv sync
      #----------------------------------------------
      # Run linting
      #----------------------------------------------
      - name: Run Ruff linting
        run: uv run ruff check ibms_project/
      #----------------------------------------------
      # Run unit tests with coverage
      #----------------------------------------------
      - name: Run tests with coverage
        run: |
          uv run python manage.py collectstatic --noinput
          uv run coverage run --source='ibms_project' manage.py test --noinput --verbosity 2
      #----------------------------------------------
      # Generate coverage report
      #----------------------------------------------
      - name: Generate coverage report
        run: |
          uv run coverage report
          uv run coverage xml
      #----------------------------------------------
      # Upload coverage to Codecov
      #----------------------------------------------
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
